<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NEPSE Simple — IPO / Issues</title>
<meta name="description" content="Open, upcoming and recent IPO / FPO / rights issues on the Nepal Stock Exchange." />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="stylesheet" href="assets/terminal.css" />
</head>
<body>

<div class="tickerbar"><div class="brand"><img class="brandlogo" src="android-chrome-192x192.png" alt="" />NEPSE&nbsp;SIMPLE</div><div class="ticker-viewport"><div class="ticker-track" id="ticker"></div></div></div>
<nav class="topnav">
  <a class="navlink" href="index.html"><span class="k">1:</span>OVERVIEW</a>
  <a class="navlink" href="terminal.html"><span class="k">2:</span>TERMINAL</a>
  <a class="navlink" href="report.html"><span class="k">3:</span>REPORT</a>
  <a class="navlink active" href="ipo.html"><span class="k">4:</span>IPO</a>
  <span class="spacer"></span>
  <span class="meta" id="clock">—</span>
  <a class="cta" href="https://ko-fi.com/J3J1TRQBI" target="_blank" rel="noopener">☕ SUPPORT</a>
</nav>

<div class="grid">
  <section class="panel">
    <div class="panel-head"><span class="caret">▾</span><span class="title">IPO · FPO · Rights — Issues</span><span class="badge" id="ipo-badge"></span></div>
    <div class="panel-body scroll-y" style="--maxh:640px"><table class="t" id="ipo"></table></div>
  </section>
</div>

<footer class="statusbar">
  <span><span class="dot" id="statusdot"></span><span id="statustext">CONNECTING</span></span>
  <span class="spacer"></span>
  <span>SOURCE: sharesansar</span>
</footer>

<script src="assets/terminal.js"></script>
<script>
const { fmt } = NQT;
function clock(){ const o={timeZone:'Asia/Kathmandu',hour:'2-digit',minute:'2-digit',hour12:false};
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',o)+' NPT'; }
function statusPill(v){
  const s=String(v||'').toLowerCase();
  if(s.includes('open')) return `<span class="up">● ${v}</span>`;
  if(s.includes('coming')) return `<span class="amber">◐ ${v}</span>`;
  if(s.includes('close')) return `<span class="dim">○ ${v}</span>`;
  return v||'—';
}
(async function(){
  clock(); setInterval(clock,1000);
  try{
    const rows = await NQT.getJSON('/ipo.json');
    if(!rows || !rows.length) throw new Error('No IPO data');
    const cols = Object.keys(rows[0]);
    const statusCol = cols.find(c=>/status/i.test(c));
    const money = v => {
      const n = typeof v==='number'?v:parseFloat(String(v).replace(/,/g,''));
      return Number.isFinite(n) ? n.toLocaleString('en-US') : v;
    };
    const numeric = c => /unit|price|amount|qty|kitta/i.test(c);
    const t=document.getElementById('ipo');
    t.innerHTML = `<thead><tr>${cols.map(c=>`<th class="${c===cols[0]?'':'num'}">${c}</th>`).join('')}</tr></thead>`
      + `<tbody>${rows.map(r=>`<tr>${cols.map(c=>{
          let v=r[c];
          if(numeric(c)) v=money(v);
          const cell = c===statusCol ? statusPill(v) : (v===null||v===undefined||v===''?'—':v);
          return `<td class="${c===cols[0]?'sym':'num mono-num'}">${cell}</td>`;
        }).join('')}</tr>`).join('')}</tbody>`;
    document.getElementById('ipo-badge').textContent = rows.length+' issues';
    document.getElementById('statustext').textContent='LIVE';
  }catch(e){
    document.getElementById('ipo').innerHTML=`<tbody><tr><td class="loading">No IPO issues to show right now. This refreshes automatically after the next pipeline run.</td></tr></tbody>`;
    document.getElementById('statustext').textContent='NO DATA'; document.getElementById('statusdot').style.background='var(--amber)';
  }
})();
</script>
</body>
</html>
